<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>This Year's Calendar</title>
<style>
  :root {
    --ink: #17120e;
    --ink-soft: #3b2d22;
    --sand: #f4e3cf;
    --sand-deep: #e5ccb3;
    --card: #f8ebda;
    --line: #d9bda2;
    --work: #4a2e1f;
    --personal: #9c6b3f;
    --health: #2f5f4c;
    --study: #375a7f;
    --family: #7d4f8a;
    --other: #555555;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    margin: 0;
    padding: 1.4rem;
    background: radial-gradient(circle at 10% 10%, #f1dcc7 0%, #ddc2a7 55%, #d5b294 100%);
    color: var(--ink);
  }
  .container {
    max-width: 980px;
    margin: auto;
    background: var(--sand);
    padding: 1.5rem;
    border-radius: 18px;
    border: 1px solid var(--line);
    box-shadow: 0 14px 35px rgba(17, 12, 8, 0.18);
  }
  .intro {
    margin-bottom: 1.2rem;
    text-align: center;
    background: linear-gradient(180deg, #f9ebdd 0%, #f2dcc6 100%);
  }
  h1, h2, h3 { margin-top: 0; color: var(--ink); }
  h1 {
    margin-bottom: 0;
    font-size: clamp(1.25rem, 2.1vw, 1.75rem);
    letter-spacing: 0.2px;
  }
  p { line-height: 1.6; color: var(--ink-soft); }
  .calendar-panel { margin-top: 0; }
  .calendar-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .calendar-nav { display: flex; gap: 0.75rem; align-items: center; }
  .calendar-nav button {
    background: var(--ink);
    color: var(--sand);
    border: none;
    padding: 0.65rem 0.95rem;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
  }
  .calendar-nav button:hover { opacity: 0.92; }
  #monthLabel { font-weight: 800; color: var(--ink); min-width: 170px; text-align: center; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; margin-top: 1rem; }
  .calendar-grid div {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 0.75rem;
    min-height: 94px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 0.35rem;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .calendar-grid div:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(0,0,0,0.12); }
  .calendar-grid .day-name {
    text-align: center;
    font-size: 0.83rem;
    font-weight: 700;
    color: var(--ink-soft);
    background: var(--sand-deep);
    border-radius: 10px;
    padding: 0.4rem 0;
    cursor: default;
    min-height: auto;
    justify-content: center;
  }
  .calendar-grid .day-number { font-size: 1.03rem; font-weight: 800; color: var(--ink); }
  .calendar-grid .today { border-color: var(--ink); background: #e7c9ad; }
  .calendar-grid .selected { outline: 2px solid var(--ink); outline-offset: -2px; }
  .calendar-grid .not-current-month { color: #8b7c71; opacity: 0.72; background: #f0dfce; cursor: default; }
  .calendar-cell { position: relative; }
  .calendar-cell-events { padding: 0; margin: 0; gap: 0.25rem; display: flex; flex-direction: column; }
  .calendar-cell-event {
    font-size: 0.73rem;
    line-height: 1.25;
    background: rgba(23, 18, 14, 0.11);
    color: #1a120d;
    border-radius: 8px;
    padding: 0.32rem 0.42rem;
    overflow: hidden;
  }
  .calendar-cell-event-time {
    font-size: 0.66rem;
    font-weight: 800;
    letter-spacing: 0.2px;
    margin-bottom: 0.1rem;
    text-transform: uppercase;
  }
  .calendar-cell-event-title {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 700;
  }
  .calendar-description { color: var(--ink-soft); margin-top: 0.75rem; }
  .helper-text { margin-top: 0.25rem; color: var(--ink-soft); }
  .event-panel { margin-top: 1.2rem; padding: 1rem 1.1rem; background: #ecd8c4; border-radius: 14px; border: 1px solid var(--line); }
  .event-panel h3 { margin: 0 0 0.75rem 0; color: var(--ink); }
  .event-form {
    display: grid;
    grid-template-columns: repeat(4, minmax(130px, 1fr));
    gap: 0.45rem;
    margin-bottom: 0.8rem;
  }
  .event-form input,
  .event-form select {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0.55rem 0.65rem;
    font: inherit;
    color: var(--ink);
    background: #fff8f1;
  }
  .event-form button {
    border: none;
    border-radius: 10px;
    padding: 0.55rem 0.9rem;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    background: var(--ink);
    color: var(--sand);
  }
  .event-category-badge {
    display: inline-block;
    margin-bottom: 0.35rem;
    padding: 0.2rem 0.5rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
  }
  .event-meta {
    color: #5e4635;
    font-size: 0.85rem;
    margin-top: 0.2rem;
  }
  .event-actions {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.6rem;
  }
  .event-actions button {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f9efe4;
    color: var(--ink);
    padding: 0.35rem 0.55rem;
    cursor: pointer;
    font: inherit;
    font-size: 0.82rem;
  }
  .event-actions button:hover { background: #f2dfcb; }
  .event-clear-day {
    margin-top: 0.8rem;
    border: none;
    border-radius: 10px;
    padding: 0.5rem 0.8rem;
    background: #3a2820;
    color: #f7ead9;
    cursor: pointer;
    font: inherit;
    font-weight: 700;
  }
  .event-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.55rem; }
  .event-item { background: #fff2e5; border: 1px solid var(--line); padding: 0.75rem 0.85rem; border-radius: 10px; color: #2b1f17; }
  .event-title { font-weight: 700; }
  .inline-edit-form {
    margin-top: 0.65rem;
    padding-top: 0.65rem;
    border-top: 1px dashed #ceb39a;
    display: grid;
    grid-template-columns: repeat(4, minmax(110px, 1fr));
    gap: 0.4rem;
  }
  .inline-edit-form input,
  .inline-edit-form select,
  .inline-edit-form button {
    border: 1px solid var(--line);
    border-radius: 8px;
    font: inherit;
    padding: 0.4rem 0.5rem;
    background: #fff8f1;
    color: var(--ink);
  }
  .inline-edit-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 0.4rem;
  }
  .inline-edit-actions button {
    cursor: pointer;
    background: #f1decb;
  }
  .hidden { display: none; }
  .day-focus-panel {
    margin-top: 1rem;
    padding: 1rem 1.1rem;
    background: #f6e8d7;
    border: 1px solid var(--line);
    border-radius: 14px;
  }
  .day-focus-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    margin-bottom: 0.65rem;
  }
  .day-focus-title {
    margin: 0;
    font-size: 1.1rem;
  }
  .day-focus-close {
    border: none;
    border-radius: 9px;
    padding: 0.42rem 0.7rem;
    font: inherit;
    font-weight: 700;
    background: var(--ink);
    color: var(--sand);
    cursor: pointer;
  }
  .day-focus-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 0.55rem;
  }
  .day-focus-item {
    background: #fff5e9;
    border: 1px solid var(--line);
    border-left-width: 7px;
    border-radius: 10px;
    padding: 0.7rem 0.8rem;
  }
  .day-focus-meta {
    color: #5e4635;
    font-size: 0.86rem;
    margin-top: 0.25rem;
  }
  .event-none { color: #634e3e; font-style: italic; }
  @media (max-width: 740px) {
    body { padding: 0.8rem; }
    .container { padding: 1rem; border-radius: 14px; }
    .calendar-grid { gap: 6px; }
    .calendar-grid div { min-height: 74px; padding: 0.55rem; }
    .calendar-grid .day-name { font-size: 0.74rem; }
    .calendar-grid .day-number { font-size: 0.9rem; }
    .calendar-cell-event { font-size: 0.68rem; }
    #monthLabel { min-width: 138px; }
    .event-form { grid-template-columns: 1fr; }
    .inline-edit-form { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container intro">
  <h1>Hi, Alin-Antonio. What event would you like to add today?</h1>
</div>

<div id="calendar" class="container calendar-panel">
  <div class="calendar-header">
    <div>
      <h2>Monthly Calendar</h2>
      <p class="helper-text">Click any date to add an event. Your events are saved in this browser.</p>
    </div>
    <div class="calendar-nav">
      <button id="prevMonth">← Previous</button>
      <div id="monthLabel"></div>
      <button id="nextMonth">Next →</button>
    </div>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
  <p class="calendar-description">Click the arrows to move through the months. Today's date is highlighted. Click any date to add or edit events.</p>
  <div class="event-panel" id="eventPanel">
    <h3 id="selectedDateHeading">Events for today</h3>
    <form class="event-form" id="eventForm">
      <input id="eventInput" type="text" placeholder="Event title" maxlength="120" />
      <select id="eventScheduleInput">
        <option value="timeframe">Time frame</option>
        <option value="allday">All day</option>
      </select>
      <input id="eventStartTimeInput" type="time" />
      <input id="eventEndTimeInput" type="time" />
      <select id="eventCategoryInput">
        <option value="personal">Personal</option>
        <option value="work">Work</option>
        <option value="health">Health</option>
        <option value="study">Study</option>
        <option value="family">Family</option>
        <option value="other">Other</option>
      </select>
      <input id="eventColorInput" type="color" value="#9c6b3f" />
      <select id="eventRecurrenceInput">
        <option value="none">One-time event</option>
        <option value="daily">Daily series</option>
        <option value="weekly">Weekly series</option>
        <option value="monthly">Monthly series</option>
      </select>
      <input id="eventRecurrenceUntilInput" type="date" />
      <button type="submit">Add</button>
    </form>
    <ul class="event-list" id="eventList"></ul>
    <button class="event-clear-day" id="clearDayBtn" type="button">Clear all events for selected day</button>
    <div class="day-focus-panel hidden" id="dayFocusPanel">
      <div class="day-focus-header">
        <h4 class="day-focus-title" id="dayFocusTitle">Day Focus</h4>
        <button class="day-focus-close" id="closeDayFocusBtn" type="button">Close Day Focus</button>
      </div>
      <ul class="day-focus-list" id="dayFocusList"></ul>
    </div>
  </div>
</div>

<script>
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  const categoryTheme = {
    personal: { label: 'Personal', color: '#9c6b3f', tint: 'rgba(156, 107, 63, 0.15)' },
    work: { label: 'Work', color: '#4a2e1f', tint: 'rgba(74, 46, 31, 0.18)' },
    health: { label: 'Health', color: '#2f5f4c', tint: 'rgba(47, 95, 76, 0.16)' },
    study: { label: 'Study', color: '#375a7f', tint: 'rgba(55, 90, 127, 0.16)' },
    family: { label: 'Family', color: '#7d4f8a', tint: 'rgba(125, 79, 138, 0.16)' },
    other: { label: 'Other', color: '#555555', tint: 'rgba(85, 85, 85, 0.15)' }
  };

  const calendarGrid = document.getElementById('calendarGrid');
  const monthLabel = document.getElementById('monthLabel');
  const eventList = document.getElementById('eventList');
  const selectedDateHeading = document.getElementById('selectedDateHeading');
  const eventForm = document.getElementById('eventForm');
  const eventInput = document.getElementById('eventInput');
  const eventScheduleInput = document.getElementById('eventScheduleInput');
  const eventStartTimeInput = document.getElementById('eventStartTimeInput');
  const eventEndTimeInput = document.getElementById('eventEndTimeInput');
  const eventCategoryInput = document.getElementById('eventCategoryInput');
  const eventColorInput = document.getElementById('eventColorInput');
  const eventRecurrenceInput = document.getElementById('eventRecurrenceInput');
  const eventRecurrenceUntilInput = document.getElementById('eventRecurrenceUntilInput');
  const clearDayBtn = document.getElementById('clearDayBtn');
  const dayFocusPanel = document.getElementById('dayFocusPanel');
  const dayFocusTitle = document.getElementById('dayFocusTitle');
  const dayFocusList = document.getElementById('dayFocusList');
  const closeDayFocusBtn = document.getElementById('closeDayFocusBtn');

  let currentDate = new Date();
  let selectedDate = new Date();
  const storedEvents = JSON.parse(localStorage.getItem('calendarEvents') || '{}');
  const events = normalizeEventsData(storedEvents || {});

  function generateEventId() {
    return `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
  }

  function normalizeCategory(category) {
    return Object.prototype.hasOwnProperty.call(categoryTheme, category) ? category : 'personal';
  }

  function normalizeRecurrence(value) {
    const allowed = ['none', 'daily', 'weekly', 'monthly'];
    return allowed.includes(value) ? value : 'none';
  }

  function formatDateKey(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function parseDateKey(dateKey) {
    const [year, month, day] = dateKey.split('-').map(Number);
    return new Date(year, month - 1, day, 12, 0, 0, 0);
  }

  function addMinutesToTime(timeValue, minutesToAdd) {
    if (!timeValue || Number.isNaN(minutesToAdd) || minutesToAdd <= 0) {
      return '';
    }

    const [hours, minutes] = timeValue.split(':').map(Number);
    const total = (hours * 60) + minutes + minutesToAdd;
    const wrapped = ((total % 1440) + 1440) % 1440;
    const nextHours = String(Math.floor(wrapped / 60)).padStart(2, '0');
    const nextMinutes = String(wrapped % 60).padStart(2, '0');
    return `${nextHours}:${nextMinutes}`;
  }

  function normalizeEventsData(inputEvents) {
    const normalized = {};
    Object.keys(inputEvents).forEach((key) => {
      const dayEvents = Array.isArray(inputEvents[key]) ? inputEvents[key] : [];
      normalized[key] = dayEvents.map((eventValue) => {
        if (typeof eventValue === 'string') {
          return {
            id: generateEventId(),
            title: eventValue,
            allDay: true,
            startTime: '',
            endTime: '',
            category: 'personal',
            color: categoryTheme.personal.color,
            recurrence: 'none',
            recurrenceUntil: ''
          };
        }

        const legacyTime = eventValue && eventValue.time ? String(eventValue.time) : '';
        const legacyDuration = eventValue && eventValue.durationMinutes ? Number(eventValue.durationMinutes) : NaN;
        const startTime = eventValue && eventValue.startTime ? String(eventValue.startTime) : legacyTime;
        const endTime = eventValue && eventValue.endTime
          ? String(eventValue.endTime)
          : addMinutesToTime(legacyTime, legacyDuration);
        const category = normalizeCategory(eventValue && eventValue.category ? String(eventValue.category) : 'personal');
        const allDay = eventValue && typeof eventValue.allDay === 'boolean'
          ? eventValue.allDay
          : (!startTime && !endTime);

        return {
          id: eventValue && eventValue.id ? String(eventValue.id) : generateEventId(),
          title: (eventValue && eventValue.title ? String(eventValue.title) : '').trim(),
          allDay,
          startTime,
          endTime,
          category,
          color: eventValue && eventValue.color ? String(eventValue.color) : categoryTheme[category].color,
          recurrence: normalizeRecurrence(eventValue && eventValue.recurrence ? String(eventValue.recurrence) : 'none'),
          recurrenceUntil: eventValue && eventValue.recurrenceUntil ? String(eventValue.recurrenceUntil) : ''
        };
      }).filter((eventValue) => eventValue.title);
    });

    return normalized;
  }

  function getCategoryMeta(category, customColor) {
    const normalized = normalizeCategory(category);
    return {
      ...categoryTheme[normalized],
      color: customColor || categoryTheme[normalized].color
    };
  }

  function saveEvents() {
    localStorage.setItem('calendarEvents', JSON.stringify(events));
  }

  function isSameDate(leftDate, rightDate) {
    return leftDate.getFullYear() === rightDate.getFullYear()
      && leftDate.getMonth() === rightDate.getMonth()
      && leftDate.getDate() === rightDate.getDate();
  }

  function eventOccursOnDate(eventData, sourceDate, targetDate) {
    const recurrence = normalizeRecurrence(eventData.recurrence);
    if (recurrence === 'none') {
      return isSameDate(sourceDate, targetDate);
    }

    if (targetDate < sourceDate) {
      return false;
    }

    if (eventData.recurrenceUntil) {
      const untilDate = parseDateKey(eventData.recurrenceUntil);
      if (targetDate > untilDate) {
        return false;
      }
    }

    if (recurrence === 'daily') {
      return true;
    }
    if (recurrence === 'weekly') {
      return sourceDate.getDay() === targetDate.getDay();
    }

    return sourceDate.getDate() === targetDate.getDate();
  }

  function getEventsForDate(date) {
    const result = [];
    Object.keys(events).forEach((sourceKey) => {
      const sourceDate = parseDateKey(sourceKey);
      (events[sourceKey] || []).forEach((eventData) => {
        if (eventOccursOnDate(eventData, sourceDate, date)) {
          result.push({
            ...eventData,
            sourceKey
          });
        }
      });
    });

    result.sort((a, b) => {
      if (a.allDay && !b.allDay) return -1;
      if (!a.allDay && b.allDay) return 1;
      return (a.startTime || '').localeCompare(b.startTime || '');
    });
    return result;
  }

  function formatEventTimeLabel(eventData) {
    if (eventData.allDay) {
      return 'All day';
    }
    if (eventData.startTime && eventData.endTime) {
      return `${eventData.startTime} - ${eventData.endTime}`;
    }
    if (eventData.startTime) {
      return eventData.startTime;
    }
    return 'No time';
  }

  function formatRecurrenceLabel(eventData) {
    if (eventData.recurrence === 'none') {
      return '';
    }

    const repeatMap = {
      daily: 'Repeats daily',
      weekly: 'Repeats weekly',
      monthly: 'Repeats monthly'
    };
    const base = repeatMap[eventData.recurrence] || '';
    if (eventData.recurrenceUntil) {
      return `${base} until ${eventData.recurrenceUntil}`;
    }
    return base;
  }

  function updateMainScheduleState() {
    const isAllDay = eventScheduleInput.value === 'allday';
    eventStartTimeInput.disabled = isAllDay;
    eventEndTimeInput.disabled = isAllDay;
    eventStartTimeInput.classList.toggle('hidden', isAllDay);
    eventEndTimeInput.classList.toggle('hidden', isAllDay);
    if (isAllDay) {
      eventStartTimeInput.value = '';
      eventEndTimeInput.value = '';
    }
  }

  function updateColorFromCategory() {
    const category = normalizeCategory(eventCategoryInput.value);
    eventColorInput.value = categoryTheme[category].color;
  }

  function addEventToDate(date, eventData) {
    const eventKey = formatDateKey(date);
    events[eventKey] = events[eventKey] || [];
    events[eventKey].push({
      id: generateEventId(),
      title: eventData.title,
      allDay: eventData.allDay,
      startTime: eventData.startTime,
      endTime: eventData.endTime,
      category: normalizeCategory(eventData.category),
      color: eventData.color,
      recurrence: normalizeRecurrence(eventData.recurrence),
      recurrenceUntil: eventData.recurrenceUntil
    });
    saveEvents();
  }

  function renderEventList(date) {
    selectedDateHeading.textContent = `Events for ${monthNames[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
    eventList.innerHTML = '';
    const dayEvents = getEventsForDate(date);

    if (!dayEvents.length) {
      const emptyItem = document.createElement('li');
      emptyItem.className = 'event-item event-none';
      emptyItem.textContent = 'No events yet. Click any date to add one.';
      eventList.appendChild(emptyItem);
      return;
    }

    dayEvents.forEach((eventData) => {
      const categoryMeta = getCategoryMeta(eventData.category, eventData.color);
      const item = document.createElement('li');
      item.className = 'event-item';
      item.dataset.eventId = eventData.id;
      item.dataset.sourceKey = eventData.sourceKey;
      item.style.borderLeft = `6px solid ${categoryMeta.color}`;

      const categoryBadge = document.createElement('span');
      categoryBadge.className = 'event-category-badge';
      categoryBadge.style.background = categoryMeta.color;
      categoryBadge.textContent = categoryMeta.label;
      item.appendChild(categoryBadge);

      const title = document.createElement('div');
      title.className = 'event-title';
      title.textContent = eventData.title;
      item.appendChild(title);

      const recurrenceLabel = formatRecurrenceLabel(eventData);
      const metaParts = [formatEventTimeLabel(eventData)];
      if (recurrenceLabel) {
        metaParts.push(recurrenceLabel);
      }
      const meta = document.createElement('div');
      meta.className = 'event-meta';
      meta.textContent = metaParts.join(' • ');
      item.appendChild(meta);

      const actionRow = document.createElement('div');
      actionRow.className = 'event-actions';

      const editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.textContent = 'Edit';
      editBtn.dataset.action = 'edit';
      editBtn.dataset.eventId = eventData.id;
      editBtn.dataset.sourceKey = eventData.sourceKey;
      actionRow.appendChild(editBtn);

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.textContent = 'Remove';
      deleteBtn.dataset.action = 'remove';
      deleteBtn.dataset.eventId = eventData.id;
      deleteBtn.dataset.sourceKey = eventData.sourceKey;
      actionRow.appendChild(deleteBtn);

      item.appendChild(actionRow);

      const inlineEditForm = document.createElement('form');
      inlineEditForm.className = 'inline-edit-form hidden';
      inlineEditForm.dataset.eventId = eventData.id;
      inlineEditForm.dataset.sourceKey = eventData.sourceKey;

      const editTitle = document.createElement('input');
      editTitle.type = 'text';
      editTitle.required = true;
      editTitle.maxLength = 120;
      editTitle.value = eventData.title;
      editTitle.dataset.field = 'title';
      inlineEditForm.appendChild(editTitle);

      const editSchedule = document.createElement('select');
      editSchedule.dataset.field = 'schedule';
      [
        { value: 'timeframe', label: 'Time frame' },
        { value: 'allday', label: 'All day' }
      ].forEach((optionDef) => {
        const option = document.createElement('option');
        option.value = optionDef.value;
        option.textContent = optionDef.label;
        option.selected = eventData.allDay ? optionDef.value === 'allday' : optionDef.value === 'timeframe';
        editSchedule.appendChild(option);
      });
      inlineEditForm.appendChild(editSchedule);

      const editStart = document.createElement('input');
      editStart.type = 'time';
      editStart.value = eventData.startTime || '';
      editStart.dataset.field = 'startTime';
      inlineEditForm.appendChild(editStart);

      const editEnd = document.createElement('input');
      editEnd.type = 'time';
      editEnd.value = eventData.endTime || '';
      editEnd.dataset.field = 'endTime';
      inlineEditForm.appendChild(editEnd);

      const editCategory = document.createElement('select');
      editCategory.dataset.field = 'category';
      Object.keys(categoryTheme).forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = categoryTheme[value].label;
        option.selected = value === eventData.category;
        editCategory.appendChild(option);
      });
      inlineEditForm.appendChild(editCategory);

      const editColor = document.createElement('input');
      editColor.type = 'color';
      editColor.value = eventData.color || categoryTheme[eventData.category].color;
      editColor.dataset.field = 'color';
      inlineEditForm.appendChild(editColor);

      const editRecurrence = document.createElement('select');
      editRecurrence.dataset.field = 'recurrence';
      [
        { value: 'none', label: 'One-time event' },
        { value: 'daily', label: 'Daily series' },
        { value: 'weekly', label: 'Weekly series' },
        { value: 'monthly', label: 'Monthly series' }
      ].forEach((optionDef) => {
        const option = document.createElement('option');
        option.value = optionDef.value;
        option.textContent = optionDef.label;
        option.selected = optionDef.value === eventData.recurrence;
        editRecurrence.appendChild(option);
      });
      inlineEditForm.appendChild(editRecurrence);

      const editUntil = document.createElement('input');
      editUntil.type = 'date';
      editUntil.value = eventData.recurrenceUntil || '';
      editUntil.dataset.field = 'recurrenceUntil';
      inlineEditForm.appendChild(editUntil);

      const inlineActions = document.createElement('div');
      inlineActions.className = 'inline-edit-actions';

      const saveBtn = document.createElement('button');
      saveBtn.type = 'submit';
      saveBtn.textContent = 'Save changes';
      inlineActions.appendChild(saveBtn);

      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.dataset.action = 'edit-cancel';
      cancelBtn.dataset.eventId = eventData.id;
      cancelBtn.dataset.sourceKey = eventData.sourceKey;
      inlineActions.appendChild(cancelBtn);

      inlineEditForm.appendChild(inlineActions);
      item.appendChild(inlineEditForm);
      eventList.appendChild(item);

      updateInlineScheduleState(inlineEditForm);
    });
  }

  function updateInlineScheduleState(formElement) {
    const schedule = formElement.querySelector('[data-field="schedule"]');
    const start = formElement.querySelector('[data-field="startTime"]');
    const end = formElement.querySelector('[data-field="endTime"]');
    const isAllDay = schedule.value === 'allday';
    start.disabled = isAllDay;
    end.disabled = isAllDay;
    start.classList.toggle('hidden', isAllDay);
    end.classList.toggle('hidden', isAllDay);
    if (isAllDay) {
      start.value = '';
      end.value = '';
    }
  }

  function renderDayFocus(date) {
    const dayEvents = getEventsForDate(date);
    dayFocusTitle.textContent = `Day Focus: ${monthNames[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
    dayFocusList.innerHTML = '';

    if (!dayEvents.length) {
      const emptyItem = document.createElement('li');
      emptyItem.className = 'day-focus-item event-none';
      emptyItem.textContent = 'No events on this day yet.';
      dayFocusList.appendChild(emptyItem);
      return;
    }

    dayEvents.forEach((eventData) => {
      const categoryMeta = getCategoryMeta(eventData.category, eventData.color);
      const item = document.createElement('li');
      item.className = 'day-focus-item';
      item.style.borderLeftColor = categoryMeta.color;

      const label = document.createElement('span');
      label.className = 'event-category-badge';
      label.style.background = categoryMeta.color;
      label.textContent = categoryMeta.label;
      item.appendChild(label);

      const title = document.createElement('div');
      title.className = 'event-title';
      title.textContent = eventData.title;
      item.appendChild(title);

      const meta = document.createElement('div');
      meta.className = 'day-focus-meta';
      const parts = [formatEventTimeLabel(eventData)];
      const recurrenceLabel = formatRecurrenceLabel(eventData);
      if (recurrenceLabel) {
        parts.push(recurrenceLabel);
      }
      meta.textContent = parts.join(' • ');
      item.appendChild(meta);

      dayFocusList.appendChild(item);
    });
  }

  function createDateCell(day, date, isCurrentMonth) {
    const cell = document.createElement('div');
    cell.className = isCurrentMonth ? 'calendar-cell' : 'not-current-month';
    if (isCurrentMonth) {
      cell.dataset.date = formatDateKey(date);
    }

    const dayNumber = document.createElement('span');
    dayNumber.className = 'day-number';
    dayNumber.textContent = day;
    cell.appendChild(dayNumber);

    if (isCurrentMonth) {
      const dayEvents = getEventsForDate(date);
      if (dayEvents.length) {
        const eventListPreview = document.createElement('div');
        eventListPreview.className = 'calendar-cell-events';
        dayEvents.slice(0, 2).forEach((eventData) => {
          const categoryMeta = getCategoryMeta(eventData.category, eventData.color);
          const eventBadge = document.createElement('div');
          eventBadge.className = 'calendar-cell-event';

          const timeLine = document.createElement('div');
          timeLine.className = 'calendar-cell-event-time';
          timeLine.textContent = formatEventTimeLabel(eventData);
          eventBadge.appendChild(timeLine);

          const titleLine = document.createElement('span');
          titleLine.className = 'calendar-cell-event-title';
          titleLine.textContent = eventData.title;
          eventBadge.appendChild(titleLine);

          eventBadge.style.borderLeft = `4px solid ${categoryMeta.color}`;
          eventBadge.style.background = categoryMeta.tint;
          eventListPreview.appendChild(eventBadge);
        });
        cell.appendChild(eventListPreview);
      }

      if (isSameDate(date, new Date())) {
        cell.classList.add('today');
      }
      if (isSameDate(date, selectedDate)) {
        cell.classList.add('selected');
      }

      cell.addEventListener('click', () => {
        selectedDate = new Date(date);
        renderCalendar(currentDate);
        renderEventList(selectedDate);
        dayFocusPanel.classList.remove('hidden');
        renderDayFocus(selectedDate);
        eventInput.focus();
      });
    }

    return cell;
  }

  function renderCalendar(date) {
    const year = date.getFullYear();
    const month = date.getMonth();
    monthLabel.textContent = `${monthNames[month]} ${year}`;
    calendarGrid.innerHTML = '';

    dayNames.forEach((day) => {
      const cell = document.createElement('div');
      cell.className = 'day-name';
      cell.textContent = day;
      calendarGrid.appendChild(cell);
    });

    const firstDay = new Date(year, month, 1);
    const startDay = firstDay.getDay();
    const lastDayOfMonth = new Date(year, month + 1, 0).getDate();
    const prevMonthLastDay = new Date(year, month, 0).getDate();

    for (let i = startDay - 1; i >= 0; i--) {
      const dateValue = new Date(year, month - 1, prevMonthLastDay - i);
      calendarGrid.appendChild(createDateCell(prevMonthLastDay - i, dateValue, false));
    }

    for (let day = 1; day <= lastDayOfMonth; day++) {
      const dateValue = new Date(year, month, day);
      calendarGrid.appendChild(createDateCell(day, dateValue, true));
    }

    const totalCells = startDay + lastDayOfMonth;
    const nextCells = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= nextCells; i++) {
      const dateValue = new Date(year, month + 1, i);
      calendarGrid.appendChild(createDateCell(i, dateValue, false));
    }
  }

  function findSourceEvent(sourceKey, eventId) {
    const sourceEvents = events[sourceKey] || [];
    const index = sourceEvents.findIndex((item) => item.id === eventId);
    return { sourceEvents, index };
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar(currentDate);
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar(currentDate);
  });

  eventScheduleInput.addEventListener('change', updateMainScheduleState);
  eventCategoryInput.addEventListener('change', updateColorFromCategory);

  eventList.addEventListener('change', (event) => {
    const form = event.target.closest('.inline-edit-form');
    if (!form) return;

    if (event.target.dataset.field === 'schedule') {
      updateInlineScheduleState(form);
    }
    if (event.target.dataset.field === 'category') {
      const colorInput = form.querySelector('[data-field="color"]');
      const category = normalizeCategory(event.target.value);
      colorInput.value = categoryTheme[category].color;
    }
  });

  eventList.addEventListener('click', (event) => {
    const targetButton = event.target.closest('button[data-action]');
    if (!targetButton) return;

    const action = targetButton.dataset.action;
    const eventId = targetButton.dataset.eventId;
    const sourceKey = targetButton.dataset.sourceKey;
    const { sourceEvents, index } = findSourceEvent(sourceKey, eventId);
    if (index === -1) return;

    if (action === 'remove') {
      sourceEvents.splice(index, 1);
      if (!sourceEvents.length) {
        delete events[sourceKey];
      }
      saveEvents();
      renderCalendar(currentDate);
      renderEventList(selectedDate);
      renderDayFocus(selectedDate);
      return;
    }

    if (action === 'edit') {
      const targetItem = targetButton.closest('.event-item');
      if (!targetItem) return;
      const form = targetItem.querySelector('.inline-edit-form');
      if (!form) return;
      form.classList.remove('hidden');
      return;
    }

    if (action === 'edit-cancel') {
      const targetItem = targetButton.closest('.event-item');
      if (!targetItem) return;
      const form = targetItem.querySelector('.inline-edit-form');
      if (!form) return;
      form.classList.add('hidden');
    }
  });

  eventList.addEventListener('submit', (event) => {
    const form = event.target.closest('.inline-edit-form');
    if (!form) return;
    event.preventDefault();

    const eventId = form.dataset.eventId;
    const sourceKey = form.dataset.sourceKey;
    const { sourceEvents, index } = findSourceEvent(sourceKey, eventId);
    if (index === -1) return;

    const nextTitle = form.querySelector('[data-field="title"]').value.trim();
    const nextSchedule = form.querySelector('[data-field="schedule"]').value;
    const nextStart = form.querySelector('[data-field="startTime"]').value.trim();
    const nextEnd = form.querySelector('[data-field="endTime"]').value.trim();
    const nextCategory = normalizeCategory(form.querySelector('[data-field="category"]').value);
    const nextColor = form.querySelector('[data-field="color"]').value;
    const nextRecurrence = normalizeRecurrence(form.querySelector('[data-field="recurrence"]').value);
    const nextUntil = form.querySelector('[data-field="recurrenceUntil"]').value;

    if (!nextTitle) return;
    if (nextSchedule === 'timeframe' && nextStart && nextEnd && nextStart >= nextEnd) {
      alert('End time should be after start time.');
      return;
    }

    sourceEvents[index] = {
      ...sourceEvents[index],
      title: nextTitle,
      allDay: nextSchedule === 'allday',
      startTime: nextSchedule === 'allday' ? '' : nextStart,
      endTime: nextSchedule === 'allday' ? '' : nextEnd,
      category: nextCategory,
      color: nextColor,
      recurrence: nextRecurrence,
      recurrenceUntil: nextRecurrence === 'none' ? '' : nextUntil
    };

    saveEvents();
    renderCalendar(currentDate);
    renderEventList(selectedDate);
    renderDayFocus(selectedDate);
  });

  eventForm.addEventListener('submit', (event) => {
    event.preventDefault();
    const title = eventInput.value.trim();
    const schedule = eventScheduleInput.value;
    const startTime = eventStartTimeInput.value;
    const endTime = eventEndTimeInput.value;
    const category = normalizeCategory(eventCategoryInput.value);
    const color = eventColorInput.value;
    const recurrence = normalizeRecurrence(eventRecurrenceInput.value);
    const recurrenceUntil = eventRecurrenceUntilInput.value;

    if (!title) {
      eventInput.focus();
      return;
    }

    if (schedule === 'timeframe' && startTime && endTime && startTime >= endTime) {
      alert('End time should be after start time.');
      return;
    }

    addEventToDate(selectedDate, {
      title,
      allDay: schedule === 'allday',
      startTime: schedule === 'allday' ? '' : startTime,
      endTime: schedule === 'allday' ? '' : endTime,
      category,
      color,
      recurrence,
      recurrenceUntil: recurrence === 'none' ? '' : recurrenceUntil
    });

    eventInput.value = '';
    eventScheduleInput.value = 'timeframe';
    eventStartTimeInput.value = '';
    eventEndTimeInput.value = '';
    eventCategoryInput.value = 'personal';
    eventColorInput.value = categoryTheme.personal.color;
    eventRecurrenceInput.value = 'none';
    eventRecurrenceUntilInput.value = '';
    updateMainScheduleState();

    renderCalendar(currentDate);
    renderEventList(selectedDate);
    renderDayFocus(selectedDate);
    dayFocusPanel.classList.remove('hidden');
    eventInput.focus();
  });

  clearDayBtn.addEventListener('click', () => {
    const visibleEvents = getEventsForDate(selectedDate);
    if (!visibleEvents.length) {
      return;
    }
    const shouldDelete = confirm('Remove all events shown for the selected date? Recurring items will be removed from their series.');
    if (!shouldDelete) {
      return;
    }

    visibleEvents.forEach((entry) => {
      const sourceEvents = events[entry.sourceKey] || [];
      const index = sourceEvents.findIndex((item) => item.id === entry.id);
      if (index !== -1) {
        sourceEvents.splice(index, 1);
        if (!sourceEvents.length) {
          delete events[entry.sourceKey];
        }
      }
    });

    saveEvents();
    renderCalendar(currentDate);
    renderEventList(selectedDate);
    renderDayFocus(selectedDate);
  });

  closeDayFocusBtn.addEventListener('click', () => {
    dayFocusPanel.classList.add('hidden');
  });

  updateMainScheduleState();
  updateColorFromCategory();
  renderCalendar(currentDate);
  renderEventList(selectedDate);
  renderDayFocus(selectedDate);
</script>
</body>
</html>
