<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>This Year's Calendar</title>
<style>
  :root {
    --ink: #17120e;
    --ink-soft: #3b2d22;
    --sand: #f4e3cf;
    --sand-deep: #e5ccb3;
    --card: #f8ebda;
    --line: #d9bda2;
    --work: #4a2e1f;
    --personal: #9c6b3f;
    --health: #2f5f4c;
    --study: #375a7f;
    --family: #7d4f8a;
    --other: #555555;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    margin: 0;
    padding: 1.4rem;
    background: radial-gradient(circle at 10% 10%, #f1dcc7 0%, #ddc2a7 55%, #d5b294 100%);
    color: var(--ink);
  }
  .container {
    max-width: 980px;
    margin: auto;
    background: var(--sand);
    padding: 1.5rem;
    border-radius: 18px;
    border: 1px solid var(--line);
    box-shadow: 0 14px 35px rgba(17, 12, 8, 0.18);
  }
  .intro {
    margin-bottom: 1.2rem;
    text-align: center;
    background: linear-gradient(180deg, #f9ebdd 0%, #f2dcc6 100%);
  }
  h1, h2, h3 { margin-top: 0; color: var(--ink); }
  h1 {
    margin-bottom: 0;
    font-size: clamp(1.25rem, 2.1vw, 1.75rem);
    letter-spacing: 0.2px;
  }
  p { line-height: 1.6; color: var(--ink-soft); }
  .calendar-panel { margin-top: 0; }
  .calendar-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .calendar-nav { display: flex; gap: 0.75rem; align-items: center; }
  .calendar-nav button {
    background: var(--ink);
    color: var(--sand);
    border: none;
    padding: 0.65rem 0.95rem;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
  }
  .calendar-nav button:hover { opacity: 0.92; }
  #monthLabel { font-weight: 800; color: var(--ink); min-width: 170px; text-align: center; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; margin-top: 1rem; }
  .calendar-grid div {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 0.75rem;
    min-height: 94px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 0.35rem;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .calendar-grid div:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(0,0,0,0.12); }
  .calendar-grid .day-name {
    text-align: center;
    font-size: 0.83rem;
    font-weight: 700;
    color: var(--ink-soft);
    background: var(--sand-deep);
    border-radius: 10px;
    padding: 0.4rem 0;
    cursor: default;
    min-height: auto;
    justify-content: center;
  }
  .calendar-grid .day-number { font-size: 1.03rem; font-weight: 800; color: var(--ink); }
  .calendar-grid .today { border-color: var(--ink); background: #e7c9ad; }
  .calendar-grid .selected { outline: 2px solid var(--ink); outline-offset: -2px; }
  .calendar-grid .not-current-month { color: #8b7c71; opacity: 0.72; background: #f0dfce; cursor: default; }
  .calendar-cell { position: relative; }
  .calendar-cell-events { padding: 0; margin: 0; gap: 0.25rem; display: flex; flex-direction: column; }
  .calendar-cell-event {
    font-size: 0.76rem;
    line-height: 1.2;
    background: rgba(23, 18, 14, 0.09);
    color: var(--ink);
    border-radius: 8px;
    padding: 0.25rem 0.4rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .calendar-description { color: var(--ink-soft); margin-top: 0.75rem; }
  .helper-text { margin-top: 0.25rem; color: var(--ink-soft); }
  .event-panel { margin-top: 1.2rem; padding: 1rem 1.1rem; background: #ecd8c4; border-radius: 14px; border: 1px solid var(--line); }
  .event-panel h3 { margin: 0 0 0.75rem 0; color: var(--ink); }
  .event-form {
    display: grid;
    grid-template-columns: minmax(170px, 1.5fr) minmax(110px, 0.9fr) minmax(140px, 1fr) auto;
    gap: 0.45rem;
    margin-bottom: 0.8rem;
  }
  .event-form input,
  .event-form select {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0.55rem 0.65rem;
    font: inherit;
    color: var(--ink);
    background: #fff8f1;
  }
  .event-form button {
    border: none;
    border-radius: 10px;
    padding: 0.55rem 0.9rem;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    background: var(--ink);
    color: var(--sand);
  }
  .event-category-badge {
    display: inline-block;
    margin-bottom: 0.35rem;
    padding: 0.2rem 0.5rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
  }
  .event-meta {
    color: #5e4635;
    font-size: 0.85rem;
    margin-top: 0.2rem;
  }
  .event-actions {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.6rem;
  }
  .event-actions button {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f9efe4;
    color: var(--ink);
    padding: 0.35rem 0.55rem;
    cursor: pointer;
    font: inherit;
    font-size: 0.82rem;
  }
  .event-actions button:hover { background: #f2dfcb; }
  .event-clear-day {
    margin-top: 0.8rem;
    border: none;
    border-radius: 10px;
    padding: 0.5rem 0.8rem;
    background: #3a2820;
    color: #f7ead9;
    cursor: pointer;
    font: inherit;
    font-weight: 700;
  }
  .event-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.55rem; }
  .event-item { background: #fff2e5; border: 1px solid var(--line); padding: 0.75rem 0.85rem; border-radius: 10px; color: #2b1f17; }
  .event-title { font-weight: 700; }
  .event-none { color: #634e3e; font-style: italic; }
  @media (max-width: 740px) {
    body { padding: 0.8rem; }
    .container { padding: 1rem; border-radius: 14px; }
    .calendar-grid { gap: 6px; }
    .calendar-grid div { min-height: 74px; padding: 0.55rem; }
    .calendar-grid .day-name { font-size: 0.74rem; }
    .calendar-grid .day-number { font-size: 0.9rem; }
    .calendar-cell-event { font-size: 0.68rem; }
    #monthLabel { min-width: 138px; }
    .event-form { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container intro">
  <h1>Hi, Alin-Antonio. What event would you like to add today?</h1>
</div>

<div id="calendar" class="container calendar-panel">
  <div class="calendar-header">
    <div>
      <h2>Monthly Calendar</h2>
      <p class="helper-text">Click any date to add an event. Your events are saved in this browser.</p>
    </div>
    <div class="calendar-nav">
      <button id="prevMonth">← Previous</button>
      <div id="monthLabel"></div>
      <button id="nextMonth">Next →</button>
    </div>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
  <p class="calendar-description">Click the arrows to move through the months. Today's date is highlighted. Click any date to add or edit events.</p>
  <div class="event-panel" id="eventPanel">
    <h3 id="selectedDateHeading">Events for today</h3>
    <form class="event-form" id="eventForm">
      <input id="eventInput" type="text" placeholder="Event title" maxlength="120" />
      <input id="eventTimeInput" type="time" />
      <input id="eventDurationInput" type="number" min="5" step="5" max="1440" placeholder="Duration (mins)" />
      <select id="eventCategoryInput">
        <option value="personal">Personal</option>
        <option value="work">Work</option>
        <option value="health">Health</option>
        <option value="study">Study</option>
        <option value="family">Family</option>
        <option value="other">Other</option>
      </select>
      <button type="submit">Add</button>
    </form>
    <ul class="event-list" id="eventList"></ul>
    <button class="event-clear-day" id="clearDayBtn" type="button">Clear all events for selected day</button>
  </div>
</div>

<script>
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  const calendarGrid = document.getElementById('calendarGrid');
  const monthLabel = document.getElementById('monthLabel');
  const eventList = document.getElementById('eventList');
  const selectedDateHeading = document.getElementById('selectedDateHeading');
  const eventForm = document.getElementById('eventForm');
  const eventInput = document.getElementById('eventInput');
  const eventTimeInput = document.getElementById('eventTimeInput');
  const eventDurationInput = document.getElementById('eventDurationInput');
  const eventCategoryInput = document.getElementById('eventCategoryInput');
  const clearDayBtn = document.getElementById('clearDayBtn');
  let currentDate = new Date();
  let selectedDate = new Date();
  const storedEvents = JSON.parse(localStorage.getItem('calendarEvents') || '{}');
  const events = normalizeEventsData(storedEvents || {});

  function normalizeEventsData(inputEvents) {
    const normalized = {};
    Object.keys(inputEvents).forEach((key) => {
      const dayEvents = Array.isArray(inputEvents[key]) ? inputEvents[key] : [];
      normalized[key] = dayEvents.map((eventValue) => {
        if (typeof eventValue === 'string') {
          return {
            id: generateEventId(),
            title: eventValue,
            time: '',
            durationMinutes: '',
            category: 'personal'
          };
        }

        return {
          id: eventValue && eventValue.id ? String(eventValue.id) : generateEventId(),
          title: (eventValue && eventValue.title ? String(eventValue.title) : '').trim(),
          time: eventValue && eventValue.time ? String(eventValue.time) : '',
          durationMinutes: eventValue && eventValue.durationMinutes !== undefined ? String(eventValue.durationMinutes) : '',
          category: normalizeCategory(eventValue && eventValue.category ? String(eventValue.category) : 'personal')
        };
      }).filter((eventValue) => eventValue.title);
    });

    return normalized;
  }

  function formatDateKey(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function generateEventId() {
    return `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
  }

  function normalizeCategory(category) {
    const allowed = ['personal', 'work', 'health', 'study', 'family', 'other'];
    return allowed.includes(category) ? category : 'personal';
  }

  function getCategoryMeta(category) {
    const normalized = normalizeCategory(category);
    const map = {
      personal: { label: 'Personal', color: 'var(--personal)', tint: 'rgba(156, 107, 63, 0.15)' },
      work: { label: 'Work', color: 'var(--work)', tint: 'rgba(74, 46, 31, 0.18)' },
      health: { label: 'Health', color: 'var(--health)', tint: 'rgba(47, 95, 76, 0.16)' },
      study: { label: 'Study', color: 'var(--study)', tint: 'rgba(55, 90, 127, 0.16)' },
      family: { label: 'Family', color: 'var(--family)', tint: 'rgba(125, 79, 138, 0.16)' },
      other: { label: 'Other', color: 'var(--other)', tint: 'rgba(85, 85, 85, 0.15)' }
    };
    return map[normalized];
  }

  function formatEventPreview(eventData) {
    const timePart = eventData.time ? `${eventData.time} ` : '';
    return `${timePart}${eventData.title}`;
  }

  function sortEventsForDay(key) {
    if (!events[key]) return;
    events[key].sort((a, b) => {
      if (!a.time && !b.time) return 0;
      if (!a.time) return 1;
      if (!b.time) return -1;
      return a.time.localeCompare(b.time);
    });
  }

  function renderEventList(date) {
    const key = formatDateKey(date);
    selectedDateHeading.textContent = `Events for ${monthNames[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
    eventList.innerHTML = '';
    const dayEvents = events[key] || [];

    if (!dayEvents.length) {
      const emptyItem = document.createElement('li');
      emptyItem.className = 'event-item event-none';
      emptyItem.textContent = 'No events yet. Click any date to add one.';
      eventList.appendChild(emptyItem);
      return;
    }

    dayEvents.forEach((eventData) => {
      const categoryMeta = getCategoryMeta(eventData.category);
      const item = document.createElement('li');
      item.className = 'event-item';
      item.dataset.eventId = eventData.id;
      item.style.borderLeft = `6px solid ${categoryMeta.color}`;

      const categoryBadge = document.createElement('span');
      categoryBadge.className = 'event-category-badge';
      categoryBadge.style.background = categoryMeta.color;
      categoryBadge.textContent = categoryMeta.label;
      item.appendChild(categoryBadge);

      const title = document.createElement('div');
      title.className = 'event-title';
      title.textContent = eventData.title;
      item.appendChild(title);

      const metaParts = [];
      if (eventData.time) metaParts.push(`Time: ${eventData.time}`);
      if (eventData.durationMinutes) metaParts.push(`Duration: ${eventData.durationMinutes} mins`);
      if (metaParts.length) {
        const meta = document.createElement('div');
        meta.className = 'event-meta';
        meta.textContent = metaParts.join(' • ');
        item.appendChild(meta);
      }

      const actionRow = document.createElement('div');
      actionRow.className = 'event-actions';

      const editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.textContent = 'Edit';
      editBtn.dataset.action = 'edit';
      editBtn.dataset.eventId = eventData.id;
      actionRow.appendChild(editBtn);

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.textContent = 'Remove';
      deleteBtn.dataset.action = 'remove';
      deleteBtn.dataset.eventId = eventData.id;
      actionRow.appendChild(deleteBtn);

      item.appendChild(actionRow);
      eventList.appendChild(item);
    });
  }

  function saveEvents() {
    localStorage.setItem('calendarEvents', JSON.stringify(events));
  }

  function addEventToDate(date, eventData) {
    const eventKey = formatDateKey(date);
    events[eventKey] = events[eventKey] || [];
    events[eventKey].push({
      id: generateEventId(),
      title: eventData.title,
      time: eventData.time,
      durationMinutes: eventData.durationMinutes,
      category: normalizeCategory(eventData.category)
    });
    sortEventsForDay(eventKey);
    saveEvents();
  }

  function createDateCell(day, date, isCurrentMonth) {
    const cell = document.createElement('div');
    cell.className = isCurrentMonth ? 'calendar-cell' : 'not-current-month';
    if (isCurrentMonth) {
      cell.dataset.date = formatDateKey(date);
    }
    const dayNumber = document.createElement('span');
    dayNumber.className = 'day-number';
    dayNumber.textContent = day;
    cell.appendChild(dayNumber);

    if (isCurrentMonth) {
      const eventKey = formatDateKey(date);
      const dayEvents = events[eventKey] || [];
      if (dayEvents.length) {
        const eventListPreview = document.createElement('div');
        eventListPreview.className = 'calendar-cell-events';
        dayEvents.slice(0, 2).forEach(eventData => {
          const categoryMeta = getCategoryMeta(eventData.category);
          const eventBadge = document.createElement('div');
          eventBadge.className = 'calendar-cell-event';
          eventBadge.textContent = formatEventPreview(eventData);
          eventBadge.style.borderLeft = `4px solid ${categoryMeta.color}`;
          eventBadge.style.background = categoryMeta.tint;
          eventListPreview.appendChild(eventBadge);
        });
        cell.appendChild(eventListPreview);
      }

      if (date.toDateString() === new Date().toDateString()) {
        cell.classList.add('today');
      }

      if (date.toDateString() === selectedDate.toDateString()) {
        cell.classList.add('selected');
      }

      cell.addEventListener('click', () => {
        selectedDate = new Date(date);
        renderCalendar(currentDate);
        renderEventList(selectedDate);
        eventInput.focus();
      });
    }

    return cell;
  }

  function renderCalendar(date) {
    const year = date.getFullYear();
    const month = date.getMonth();
    monthLabel.textContent = `${monthNames[month]} ${year}`;
    calendarGrid.innerHTML = '';

    dayNames.forEach(day => {
      const cell = document.createElement('div');
      cell.className = 'day-name';
      cell.textContent = day;
      calendarGrid.appendChild(cell);
    });

    const firstDay = new Date(year, month, 1);
    const startDay = firstDay.getDay();
    const lastDayOfMonth = new Date(year, month + 1, 0).getDate();
    const prevMonthLastDay = new Date(year, month, 0).getDate();

    for (let i = startDay - 1; i >= 0; i--) {
      const date = new Date(year, month - 1, prevMonthLastDay - i);
      const cell = createDateCell(prevMonthLastDay - i, date, false);
      calendarGrid.appendChild(cell);
    }

    for (let day = 1; day <= lastDayOfMonth; day++) {
      const date = new Date(year, month, day);
      const cell = createDateCell(day, date, true);
      calendarGrid.appendChild(cell);
    }

    const totalCells = startDay + lastDayOfMonth;
    const nextCells = (7 - (totalCells % 7)) % 7;

    for (let i = 1; i <= nextCells; i++) {
      const date = new Date(year, month + 1, i);
      const cell = createDateCell(i, date, false);
      calendarGrid.appendChild(cell);
    }
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar(currentDate);
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar(currentDate);
  });

  eventList.addEventListener('click', (event) => {
    const targetButton = event.target.closest('button[data-action]');
    if (!targetButton) return;

    const action = targetButton.dataset.action;
    const eventId = targetButton.dataset.eventId;
    const key = formatDateKey(selectedDate);
    const dayEvents = events[key] || [];
    const eventIndex = dayEvents.findIndex((item) => item.id === eventId);
    if (eventIndex === -1) return;

    if (action === 'remove') {
      dayEvents.splice(eventIndex, 1);
      if (!dayEvents.length) {
        delete events[key];
      }
      saveEvents();
      renderCalendar(currentDate);
      renderEventList(selectedDate);
      return;
    }

    if (action === 'edit') {
      const existing = dayEvents[eventIndex];
      const newTitle = prompt('Edit event title:', existing.title);
      if (newTitle === null) return;
      const trimmedTitle = newTitle.trim();
      if (!trimmedTitle) return;

      const newTime = prompt('Edit time (HH:MM, optional):', existing.time || '') || '';
      const newDuration = prompt('Edit duration in minutes (optional):', existing.durationMinutes || '') || '';
      const newCategory = prompt('Edit category (personal/work/health/study/family/other):', existing.category || 'personal') || 'personal';

      dayEvents[eventIndex] = {
        ...existing,
        title: trimmedTitle,
        time: newTime.trim(),
        durationMinutes: newDuration.trim(),
        category: normalizeCategory(newCategory.trim().toLowerCase())
      };

      sortEventsForDay(key);
      saveEvents();
      renderCalendar(currentDate);
      renderEventList(selectedDate);
    }
  });

  eventForm.addEventListener('submit', (event) => {
    event.preventDefault();
    const trimmed = eventInput.value.trim();
    if (!trimmed) {
      eventInput.focus();
      return;
    }
    addEventToDate(selectedDate, {
      title: trimmed,
      time: eventTimeInput.value,
      durationMinutes: eventDurationInput.value ? String(eventDurationInput.value) : '',
      category: eventCategoryInput.value
    });
    eventInput.value = '';
    eventTimeInput.value = '';
    eventDurationInput.value = '';
    eventCategoryInput.value = 'personal';
    renderCalendar(currentDate);
    renderEventList(selectedDate);
    eventInput.focus();
  });

  clearDayBtn.addEventListener('click', () => {
    const key = formatDateKey(selectedDate);
    if (!events[key] || !events[key].length) {
      return;
    }
    const shouldDelete = confirm('Remove all events for the selected date?');
    if (!shouldDelete) {
      return;
    }
    delete events[key];
    saveEvents();
    renderCalendar(currentDate);
    renderEventList(selectedDate);
  });

  renderCalendar(currentDate);
  renderEventList(selectedDate);
</script>
</body>
</html>
